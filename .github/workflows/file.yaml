name: Hello World Workflow
on: 
  push:
    branches: ['main']
  pull_request:
    branches: ["dev","prod"]
jobs:
   build-and-test:
     runs-on: ubuntu-latest
     steps:
       - name: Checkout repository
         uses: actions/checkout@v6
         
       - name: user nodejs version 
         uses: actions/setup-node@v6
       
       - name: Install dependencies 
         run: npm install 
         
       - name: Build Project 
         run: npm run build
