name: Hello World Workflow
on: workflow_dispatch
jobs:
   build-and-test:
     runs-on: ubuntu-latest
     steps:
       - name: Checkout repository
         uses: actions/checkout@v6
         
       - name: Setup Docker BuildX
         uses: docker/setup-buildx-action@v4
       
       - name: Build Docker Image 
         run: docker build -t ${{ secrets.IMAGE_NAME }}  .
  
       - name: Install Trivy 
         uses: aquasecurity/trivy-action@v0.36.0
         with: 
           scan-type: 'image'
           image-ref: "${{ secrets.IMAGE_NAME }}:latest"
           format: 'table'
           exit-code: '0'
           ignore-unfixed: true

       - name: Login to Azure Container Registry
         uses: docker/login-action@v3
         with:
           registry: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}
           username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
           password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

       - name: Tag image for ACR
         run: |
           docker tag ${{ secrets.IMAGE_NAME }}:latest \
           ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/${{ secrets.IMAGE_NAME }}:latest

       - name: Push image to ACR
         run: |
           docker push ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/${{ secrets.IMAGE_NAME }}:latest

       - name: Set AKS 
         uses: azure/aks-set-context@v3 
         with: 
           resource-group: ${{ secrets.AKS_RESOURCE_GROUP }} 
           cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
 
       - name: Deploy to AKS
         uses: Azure/k8s-deploy@v4
         with: 
          mainfest: |
           kubernetes/deployment.yaml
           kubernetes/service.yaml
          images:
           ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/${{ secrets.IMAGE_NAME }}:latest


